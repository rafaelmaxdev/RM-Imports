    <!-- Redirect Instagram/Facebook in-app browser to external browser for payment compatibility -->
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = ua.indexOf('Instagram') > -1;
        var isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        if (isInstagram || isFacebook) {
          var url = window.location.href;
          // Try to open in external browser
          // On iOS: try opening in Safari
          if (/iPad|iPhone|iPod/.test(ua)) {
            // Replace https:// with safari-https:// to open in Safari (iOS 9+)
            // Fallback: just let the user know
          }
          // Show a banner asking user to open in external browser
          // We set a flag so React can also detect and show a persistent banner
          window.__inAppBrowser = true;
        }
      })();
    </script>
